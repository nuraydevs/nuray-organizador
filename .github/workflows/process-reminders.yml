name: Process Telegram Reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call reminder endpoint
        env:
          REMINDER_CRON_SECRET: ${{ secrets.REMINDER_CRON_SECRET }}
        run: |
          curl -fsS -X POST "https://nuray-organizador.vercel.app/api/reminders/send-due?secret=${REMINDER_CRON_SECRET}"
